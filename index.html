<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamVault — Watch Anything</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080a0e;
    --surface: #0f1218;
    --surface2: #161b24;
    --border: #1e2530;
    --accent: #e8b84b;
    --accent2: #e05c3a;
    --text: #eef0f4;
    --muted: #6b7585;
    --card-w: 180px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── NOISE OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 2rem;
    padding: 0 2.5rem;
    height: 64px;
    background: linear-gradient(to bottom, rgba(8,10,14,0.98), transparent);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 3px;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(232,184,75,0.4);
    flex-shrink: 0;
  }
  .logo span { color: var(--accent2); }

  .search-wrap {
    display: flex;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0 1rem;
    flex: 1;
    max-width: 480px;
    transition: border-color .2s;
  }
  .search-wrap:focus-within { border-color: var(--accent); }
  .search-wrap input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: .95rem;
    padding: .65rem .5rem;
    width: 100%;
  }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon { color: var(--muted); font-size: 1rem; }

  .type-btns { display: flex; gap: .5rem; margin-left: auto; }
  .type-btn {
    font-family: 'DM Mono', monospace;
    font-size: .75rem;
    letter-spacing: 1px;
    padding: .4rem .9rem;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all .2s;
    text-transform: uppercase;
  }
  .type-btn.active, .type-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232,184,75,0.08);
  }

  /* ── HERO ── */
  #hero {
    position: relative;
    min-height: 520px;
    display: flex;
    align-items: flex-end;
    padding: 100px 2.5rem 3rem;
    overflow: hidden;
    margin-bottom: 2rem;
  }
  #hero-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center top;
    filter: brightness(0.3) saturate(1.2);
    transition: all .8s ease;
  }
  #hero-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to right, rgba(8,10,14,0.95) 30%, transparent 80%),
                linear-gradient(to top, rgba(8,10,14,1) 0%, transparent 50%);
  }
  .hero-content { position: relative; z-index: 2; max-width: 540px; }
  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: .4rem;
    font-family: 'DM Mono', monospace;
    font-size: .7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(232,184,75,0.1);
    border: 1px solid rgba(232,184,75,0.25);
    padding: .3rem .7rem;
    border-radius: 4px;
    margin-bottom: 1rem;
  }
  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    letter-spacing: 2px;
    line-height: 1;
    margin-bottom: .8rem;
    text-shadow: 0 2px 20px rgba(0,0,0,0.8);
  }
  .hero-meta {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
    font-size: .85rem;
    color: var(--muted);
  }
  .hero-meta .rating {
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-weight: 500;
  }
  .hero-plot {
    font-size: .9rem;
    line-height: 1.7;
    color: #9aa3b0;
    margin-bottom: 1.5rem;
    max-width: 420px;
  }
  .hero-btns { display: flex; gap: .75rem; flex-wrap: wrap; }
  .btn-play {
    display: flex;
    align-items: center;
    gap: .6rem;
    padding: .75rem 1.8rem;
    background: var(--accent);
    color: #080a0e;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: .9rem;
    border: none;
    border-radius: 7px;
    cursor: pointer;
    transition: all .2s;
    text-shadow: none;
  }
  .btn-play:hover { background: #f0c95c; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(232,184,75,0.35); }
  .btn-info {
    display: flex;
    align-items: center;
    gap: .6rem;
    padding: .75rem 1.6rem;
    background: rgba(255,255,255,0.08);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: .9rem;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 7px;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-info:hover { background: rgba(255,255,255,0.14); transform: translateY(-2px); }

  /* ── SECTIONS ── */
  main { padding: 0 2.5rem 4rem; }
  .section { margin-bottom: 2.5rem; }
  .section-header {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 1.25rem;
  }
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 2px;
    color: var(--text);
  }
  .section-sub {
    font-size: .8rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  /* ── CARD GRID ── */
  .grid {
    display: flex;
    gap: 1rem;
    overflow-x: auto;
    padding-bottom: .75rem;
    scrollbar-width: none;
  }
  .grid::-webkit-scrollbar { display: none; }

  .card {
    flex-shrink: 0;
    width: var(--card-w);
    cursor: pointer;
    transition: transform .25s, box-shadow .25s;
  }
  .card:hover { transform: translateY(-6px) scale(1.02); }
  .card:hover .card-poster { border-color: var(--accent); box-shadow: 0 12px 40px rgba(232,184,75,0.2); }

  .card-poster {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    border-radius: 8px;
    border: 2px solid transparent;
    background: var(--surface2);
    transition: all .25s;
    display: block;
  }
  .card-poster-placeholder {
    width: 100%;
    aspect-ratio: 2/3;
    border-radius: 8px;
    background: var(--surface2);
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
  }
  .card-title {
    font-size: .82rem;
    font-weight: 500;
    margin-top: .6rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-year {
    font-size: .73rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  /* ── MODAL / PLAYER ── */
  #modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(5,6,9,0.92);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
    padding: 1.5rem;
  }
  #modal-overlay.open { display: flex; animation: fadeIn .2s ease; }

  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }

  #modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    width: 100%;
    max-width: 960px;
    max-height: 90vh;
    overflow-y: auto;
    scrollbar-width: none;
    position: relative;
    animation: slideUp .3s cubic-bezier(.22,1,.36,1);
  }
  @keyframes slideUp { from { transform: translateY(30px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }

  #modal-close {
    position: absolute;
    top: 1rem; right: 1rem;
    background: rgba(255,255,255,0.08);
    border: none;
    color: var(--text);
    width: 36px; height: 36px;
    border-radius: 50%;
    font-size: 1.2rem;
    cursor: pointer;
    z-index: 5;
    transition: background .2s;
    display: flex; align-items: center; justify-content: center;
  }
  #modal-close:hover { background: rgba(255,255,255,0.16); }

  .player-wrap {
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    border-radius: 14px 14px 0 0;
    overflow: hidden;
    position: relative;
  }
  .player-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  .modal-info {
    padding: 1.75rem 2rem 2rem;
  }
  .modal-top {
    display: flex;
    gap: 1.5rem;
    margin-bottom: 1.25rem;
  }
  .modal-poster {
    width: 90px;
    flex-shrink: 0;
    border-radius: 8px;
    border: 2px solid var(--border);
  }
  .modal-poster-placeholder {
    width: 90px;
    height: 135px;
    flex-shrink: 0;
    border-radius: 8px;
    border: 2px solid var(--border);
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
  }
  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 1px;
    line-height: 1.1;
    margin-bottom: .5rem;
  }
  .modal-meta {
    display: flex;
    flex-wrap: wrap;
    gap: .5rem .75rem;
    margin-bottom: .75rem;
  }
  .tag {
    font-family: 'DM Mono', monospace;
    font-size: .72rem;
    padding: .25rem .6rem;
    border-radius: 4px;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .tag.rating { border-color: rgba(232,184,75,0.4); color: var(--accent); }
  .tag.genre { border-color: rgba(224,92,58,0.3); color: #e07060; }

  .modal-plot {
    font-size: .9rem;
    line-height: 1.7;
    color: #9aa3b0;
    margin-bottom: 1.25rem;
  }
  .modal-cast {
    font-size: .82rem;
    color: var(--muted);
    line-height: 1.6;
  }
  .modal-cast strong { color: var(--text); font-weight: 500; }

  /* Season selector */
  .season-bar {
    display: flex;
    align-items: center;
    gap: .75rem;
    margin-bottom: 1.25rem;
    padding: 1rem 2rem;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .season-label {
    font-family: 'DM Mono', monospace;
    font-size: .75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-right: .25rem;
  }
  .season-btn {
    padding: .35rem .8rem;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: .75rem;
    cursor: pointer;
    transition: all .2s;
  }
  .season-btn.active, .season-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(232,184,75,0.08); }

  /* Loading spinner */
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 3rem auto;
  }
  @keyframes spin { to { transform: rotate(360deg) } }

  /* Search results */
  #search-section { display: none; }
  #search-section.visible { display: block; }

  /* Hero skeleton */
  .skeleton {
    background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 6px;
  }
  @keyframes shimmer { to { background-position: -200% 0 } }

  /* Responsive */
  @media (max-width: 600px) {
    nav { padding: 0 1rem; }
    main { padding: 0 1rem 3rem; }
    #hero { padding: 90px 1rem 2rem; }
    .modal-info { padding: 1.25rem 1rem 1.5rem; }
    .season-bar { padding: 1rem; }
    .type-btns { display: none; }
    :root { --card-w: 140px; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="logo">Stream<span>Vault</span></div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="search-input" placeholder="Search movies, shows…" autocomplete="off">
  </div>
  <div class="type-btns">
    <button class="type-btn active" data-type="movie" onclick="setType('movie',this)">Movies</button>
    <button class="type-btn" data-type="series" onclick="setType('series',this)">Series</button>
  </div>
</nav>

<!-- HERO -->
<section id="hero">
  <div id="hero-bg"></div>
  <div class="hero-content" id="hero-content">
    <div class="spinner"></div>
  </div>
</section>

<!-- MAIN -->
<main>
  <!-- Search results -->
  <section class="section" id="search-section">
    <div class="section-header">
      <span class="section-title">Search Results</span>
      <span class="section-sub" id="search-count"></span>
    </div>
    <div class="grid" id="search-grid"></div>
  </section>

  <!-- Trending Movies -->
  <section class="section" id="sec-trending">
    <div class="section-header">
      <span class="section-title">Trending Now</span>
      <span class="section-sub">Top picks</span>
    </div>
    <div class="grid" id="grid-trending"></div>
  </section>

  <!-- Popular Series -->
  <section class="section" id="sec-series">
    <div class="section-header">
      <span class="section-title">Popular Series</span>
      <span class="section-sub">Binge-worthy</span>
    </div>
    <div class="grid" id="grid-series"></div>
  </section>

  <!-- Action -->
  <section class="section">
    <div class="section-header">
      <span class="section-title">Action & Thriller</span>
    </div>
    <div class="grid" id="grid-action"></div>
  </section>

  <!-- Classics -->
  <section class="section">
    <div class="section-header">
      <span class="section-title">All-Time Classics</span>
    </div>
    <div class="grid" id="grid-classics"></div>
  </section>
</main>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <button id="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ── CONFIG ──
const OMDB_KEY = 'trilogy'; // free key; swap for your own at omdbapi.com
const EMBED_BASE = 'https://streamimdb.ru/embed';

// ── DATA: curated IMDb IDs ──
const CATALOG = {
  trending: [
    'tt9362722','tt1160419','tt15398776','tt1877830','tt10872600',
    'tt9764362','tt6791350','tt14513804','tt21454134','tt14230458'
  ],
  series: [
    'tt0773262','tt0944947','tt0903747','tt2306299','tt4574334',
    'tt7366338','tt5491994','tt5180504','tt8111088','tt1190634'
  ],
  action: [
    'tt1745960','tt4154756','tt4154796','tt6966692','tt0848228',
    'tt2488496','tt3498820','tt7286456','tt0317219','tt1745054'
  ],
  classics: [
    'tt0111161','tt0068646','tt0468569','tt0167260','tt0108052',
    'tt0110912','tt0816692','tt0133093','tt0137523','tt0245429'
  ]
};

let currentType = 'movie';
let heroItems = [];
let heroIdx = 0;
let heroInterval;

// ── OMDB FETCH ──
async function fetchOMDB(params) {
  const url = new URL('https://www.omdbapi.com/');
  url.searchParams.set('apikey', OMDB_KEY);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k,v));
  try {
    const r = await fetch(url);
    const d = await r.json();
    return d.Response === 'True' ? d : null;
  } catch { return null; }
}

async function fetchById(imdbId) {
  return fetchOMDB({ i: imdbId, plot: 'short' });
}

async function searchOMDB(query, type) {
  return fetchOMDB({ s: query, type });
}

// ── RENDER CARD ──
function makeCard(item) {
  const div = document.createElement('div');
  div.className = 'card';
  div.title = item.Title;
  div.onclick = () => openModal(item.imdbID, item.Type || currentType);

  if (item.Poster && item.Poster !== 'N/A') {
    const img = document.createElement('img');
    img.className = 'card-poster';
    img.src = item.Poster;
    img.alt = item.Title;
    img.loading = 'lazy';
    div.appendChild(img);
  } else {
    const ph = document.createElement('div');
    ph.className = 'card-poster-placeholder';
    ph.textContent = '🎬';
    div.appendChild(ph);
  }

  const title = document.createElement('div');
  title.className = 'card-title';
  title.textContent = item.Title;

  const year = document.createElement('div');
  year.className = 'card-year';
  year.textContent = item.Year || '';

  div.appendChild(title);
  div.appendChild(year);
  return div;
}

// ── LOAD GRID ──
async function loadGrid(ids, gridId) {
  const grid = document.getElementById(gridId);
  grid.innerHTML = '<div class="spinner" style="margin:1rem auto;flex-shrink:0"></div>';

  const items = await Promise.all(ids.map(id => fetchById(id)));
  grid.innerHTML = '';
  items.filter(Boolean).forEach(item => grid.appendChild(makeCard(item)));
}

// ── HERO ──
async function loadHero() {
  const ids = [...CATALOG.trending, ...CATALOG.series].slice(0,8);
  const items = await Promise.all(ids.map(id => fetchById(id)));
  heroItems = items.filter(Boolean);
  if (heroItems.length) renderHero(0);
  heroInterval = setInterval(() => {
    heroIdx = (heroIdx + 1) % heroItems.length;
    renderHero(heroIdx);
  }, 7000);
}

function renderHero(idx) {
  const d = heroItems[idx];
  const bg = document.getElementById('hero-bg');
  const content = document.getElementById('hero-content');

  if (d.Poster && d.Poster !== 'N/A') {
    bg.style.backgroundImage = `url(${d.Poster.replace('SX300','SX800')})`;
  }

  content.innerHTML = `
    <div class="hero-badge">● Now Streaming</div>
    <div class="hero-title">${d.Title}</div>
    <div class="hero-meta">
      <span class="rating">★ ${d.imdbRating !== 'N/A' ? d.imdbRating : '—'}</span>
      <span>${d.Year}</span>
      <span>${d.Runtime !== 'N/A' ? d.Runtime : ''}</span>
      <span>${d.Rated !== 'N/A' ? d.Rated : ''}</span>
    </div>
    <div class="hero-plot">${d.Plot !== 'N/A' ? d.Plot : ''}</div>
    <div class="hero-btns">
      <button class="btn-play" onclick="openModal('${d.imdbID}','${d.Type}')">
        ▶ Play Now
      </button>
      <button class="btn-info" onclick="openModal('${d.imdbID}','${d.Type}')">
        ℹ More Info
      </button>
    </div>
  `;
}

// ── MODAL / PLAYER ──
async function openModal(imdbId, type) {
  clearInterval(heroInterval);
  const overlay = document.getElementById('modal-overlay');
  const body = document.getElementById('modal-body');
  overlay.classList.add('open');
  body.innerHTML = '<div class="spinner" style="margin:4rem auto"></div>';

  const d = await fetchById(imdbId);
  if (!d) { body.innerHTML = '<p style="padding:2rem;color:var(--muted)">Could not load details.</p>'; return; }

  const isSeries = d.Type === 'series';
  const embedType = isSeries ? 'tv' : 'movie';
  const embedUrl = `${EMBED_BASE}/${embedType}/${imdbId}`;

  let seasonBar = '';
  if (isSeries && d.totalSeasons && d.totalSeasons !== 'N/A') {
    const total = parseInt(d.totalSeasons);
    const btns = Array.from({length: total}, (_,i) =>
      `<button class="season-btn${i===0?' active':''}" onclick="changeSeason('${imdbId}',${i+1},this)">S${String(i+1).padStart(2,'0')}</button>`
    ).join('');
    seasonBar = `
      <div class="season-bar">
        <span class="season-label">Season</span>${btns}
      </div>`;
  }

  const posterHtml = d.Poster && d.Poster !== 'N/A'
    ? `<img class="modal-poster" src="${d.Poster}" alt="${d.Title}">`
    : `<div class="modal-poster-placeholder">🎬</div>`;

  const genres = (d.Genre || '').split(',').map(g =>
    `<span class="tag genre">${g.trim()}</span>`).join('');

  body.innerHTML = `
    <div class="player-wrap">
      <iframe id="player-frame" src="${embedUrl}" allowfullscreen allow="autoplay; fullscreen"></iframe>
    </div>
    ${seasonBar}
    <div class="modal-info">
      <div class="modal-top">
        ${posterHtml}
        <div>
          <div class="modal-title">${d.Title}</div>
          <div class="modal-meta">
            <span class="tag">${d.Year}</span>
            ${d.imdbRating !== 'N/A' ? `<span class="tag rating">★ ${d.imdbRating} IMDb</span>` : ''}
            ${d.Runtime !== 'N/A' ? `<span class="tag">${d.Runtime}</span>` : ''}
            ${d.Rated !== 'N/A' ? `<span class="tag">${d.Rated}</span>` : ''}
            ${genres}
          </div>
          <div class="modal-cast">
            <strong>Director:</strong> ${d.Director !== 'N/A' ? d.Director : '—'}<br>
            <strong>Cast:</strong> ${d.Actors !== 'N/A' ? d.Actors : '—'}
          </div>
        </div>
      </div>
      <div class="modal-plot">${d.Plot !== 'N/A' ? d.Plot : ''}</div>
    </div>
  `;
}

function changeSeason(imdbId, season, btn) {
  document.querySelectorAll('.season-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const frame = document.getElementById('player-frame');
  if (frame) frame.src = `${EMBED_BASE}/tv/${imdbId}?season=${season}`;
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('modal-body').innerHTML = '';
  heroInterval = setInterval(() => {
    heroIdx = (heroIdx + 1) % heroItems.length;
    renderHero(heroIdx);
  }, 7000);
}

// close on overlay click
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// ── SEARCH ──
let searchTimer;
const searchInput = document.getElementById('search-input');
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  const q = searchInput.value.trim();
  if (!q) { hideSearch(); return; }
  searchTimer = setTimeout(() => doSearch(q), 400);
});

async function doSearch(q) {
  const sec = document.getElementById('search-section');
  const grid = document.getElementById('search-grid');
  const count = document.getElementById('search-count');
  sec.classList.add('visible');
  grid.innerHTML = '<div class="spinner" style="margin:1rem auto;flex-shrink:0"></div>';

  const result = await searchOMDB(q, currentType);
  grid.innerHTML = '';
  if (!result || !result.Search) {
    grid.innerHTML = '<p style="color:var(--muted);padding:1rem;font-size:.9rem">No results found.</p>';
    count.textContent = '';
    return;
  }
  count.textContent = `${result.totalResults} results`;
  result.Search.forEach(item => grid.appendChild(makeCard(item)));
}

function hideSearch() {
  document.getElementById('search-section').classList.remove('visible');
  document.getElementById('search-grid').innerHTML = '';
}

function setType(type, btn) {
  currentType = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const q = searchInput.value.trim();
  if (q) doSearch(q);
}

// ── INIT ──
(async () => {
  loadHero();
  loadGrid(CATALOG.trending, 'grid-trending');
  loadGrid(CATALOG.series, 'grid-series');
  loadGrid(CATALOG.action, 'grid-action');
  loadGrid(CATALOG.classics, 'grid-classics');
})();
</script>
